configuration:
  bind_address:
    name: Bind Address
    description: >-
      IP address BamBuddy should bind to. Useful if you have multiple network
      interfaces or IP aliases (e.g. 192.168.50.53). Leave empty to bind to all
      interfaces (0.0.0.0).
  timezone:
    name: Timezone
    description: >-
      Your local timezone (e.g. Europe/Rome). Used for correct timestamps in
      logs and the UI.
  log_level:
    name: Log Level
    description: >-
      Verbosity of BamBuddy logs. Use 'info' for normal use, 'debug' for
      troubleshooting.
  trusted_frame_origins:
    name: Trusted Frame Origins
    description: >-
      Space-separated list of origins allowed to embed BamBuddy in an iframe
      (e.g. http://192.168.1.100:8123 https://ha.yourdomain.com).
      Required to use BamBuddy as a Home Assistant sidebar webpage panel.
