configuration:
  bind_address:
    name: Bind Address
    description: >-
      IP address BamBuddy should bind to. Useful if you have multiple network
      interfaces or IP aliases (e.g. 192.168.50.53). Leave empty to bind to all
      interfaces (IPv4 and IPv6).
  log_level:
    name: Log Level
    description: >-
      Verbosity of BamBuddy logs. Use 'info' for normal use, 'debug' for
      troubleshooting.
  trusted_frame_origins:
    name: Trusted Frame Origins
    description: >-
      List of origins allowed to embed BamBuddy in an iframe — one entry per
      line, each in scheme://host[:port] form, no paths (e.g.
      http://192.168.1.100:8123 and https://ha.yourdomain.com as two separate
      entries). Required to use BamBuddy as a Home Assistant sidebar webpage
      panel.
  ha_url:
    name: Home Assistant URL
    description: >-
      URL of the Home Assistant instance BamBuddy should talk to (e.g. for
      power/energy sensor automations). Leave empty to use this Supervisor's
      own Core API automatically — no need to set this on a normal HA
      Supervised/OS install.
  ha_token:
    name: Home Assistant Long-Lived Token
    description: >-
      Long-lived access token for the Home Assistant instance set in Home
      Assistant URL. Leave empty to use the Supervisor's own token
      automatically — only needed if Home Assistant URL points to a
      different, external HA instance.
  database_url:
    name: External Database URL
    description: >-
      Optional external PostgreSQL connection string (e.g.
      postgresql+asyncpg://bambuddy:password@db-host:5432/bambuddy). Leave
      empty to use BamBuddy's built-in SQLite database.
  enable_share:
    name: Enable /share as External Folder
    description: >-
      Allow BamBuddy's File Manager to register Home Assistant's /share
      folder as an external library folder (NAS shares, USB drives, etc.
      already reachable via /share).
  enable_media:
    name: Enable /media as External Folder
    description: >-
      Allow BamBuddy's File Manager to register Home Assistant's /media
      folder as an external library folder.
  use_system_trust_store:
    name: Use System Trust Store
    description: >-
      Enable this if BamBuddy needs to validate a self-signed certificate,
      for example when Home Assistant URL points to a Home Assistant instance
      using a self-signed HTTPS certificate. Requires Certificate Filename to
      be set and the certificate file to be placed in the add-on's config
      folder.
  certfile:
    name: Certificate Filename
    description: >-
      Filename of the CA certificate (.crt) to trust, placed in this add-on's
      config folder (accessible via the File Editor add-on). Only used when
      Use System Trust Store is enabled.