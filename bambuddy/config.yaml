name: BamBuddy
version: "1.0.11"
slug: bambuddy
description: Self-hosted command center for Bambu Lab printers. No cloud required.
url: https://github.com/naked-head/homeassistant-addons
arch:
  - aarch64
  - amd64
  - armv7
init: false
homeassistant_api: true
host_network: true
map:
  - addon_config:rw
  - data:rw
  - share:rw
  - media:rw
ports:
  8000/tcp: 8000
  3000/tcp: 3000
  3002/tcp: 3002
  2021/udp: 2021
  8883/tcp: 8883
  6000/tcp: 6000
  322/tcp: 322
  990/tcp: 990
  2024/tcp: 2024
  2025/tcp: 2025
  2026/tcp: 2026
ports_description:
  8000/tcp: BamBuddy Web UI
  3000/tcp: Slicer bind/detect handshake
  3002/tcp: Slicer bind/detect handshake (alt)
  2021/udp: SSDP printer discovery
  8883/tcp: MQTT over TLS (Virtual Printer)
  6000/tcp: File transfer tunnel
  322/tcp: RTSP camera streaming (X1/H2/P2)
  990/tcp: FTPS control
  2024/tcp: Proprietary slicer port (A1/P1S)
  2025/tcp: Proprietary slicer port (A1/P1S)
  2026/tcp: Proprietary slicer port (A1/P1S)
options:
  log_level: "info"
  trusted_frame_origins: []
  enable_share: false
  enable_media: false
  use_system_trust_store: false
  certfile: "custom_ca.crt"
schema:
  bind_address: "str?"
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
  trusted_frame_origins:
    - "str"
  ha_url: "str?"
  ha_token: "password?"
  database_url: "password?"
  enable_share: "bool"
  enable_media: "bool"
  use_system_trust_store: "bool"
  certfile: "str"
webui: http://[HOST]:[PORT:8000]
watchdog: http://[HOST]:[PORT:8000]/health