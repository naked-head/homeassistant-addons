name: BamBuddy Lint
on: [push, pull_request]

permissions:
  contents: read
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -x -e SC1091,SC2154 \
            bambuddy/rootfs/etc/services.d/*/run \
            bambuddy/rootfs/etc/services.d/*/finish \
            bambuddy/test/*.sh

  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install yamllint
      - run: yamllint -d relaxed bambuddy/config.yaml bambuddy/build.yaml
