name: Lint
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -x -e SC1091,SC2154 \
            */rootfs/etc/services.d/*/run \
            */rootfs/etc/services.d/*/finish \
            */test/*.sh

  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install yamllint
      - run: yamllint bambuddy/config.yaml bambuddy/build.yaml bambu-studio-api/config.yaml influxdb/config.yaml
