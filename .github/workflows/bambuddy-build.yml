name: BamBuddy Build
on:
  push:
    paths: ['bambuddy/**', '.github/workflows/bambuddy-build.yml']
  pull_request:
    paths: ['bambuddy/**', '.github/workflows/bambuddy-build.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64, armv7]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.arch }}
        uses: home-assistant/builder@master
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data/bambuddy \
            --test \
            --docker-hub-check
