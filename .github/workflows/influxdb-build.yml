name: InfluxDB Builder
on:
  push:
    branches:
      - main
    paths:
      - "influxdb/**"
      - ".github/workflows/influxdb-build.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Override app version (defaults to config.yaml)"
        required: false
permissions:
  contents: read
  packages: write
jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version from config.yaml
        id: meta
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "${version}" ]; then
            version=$(grep -E '^version:' influxdb/config.yaml | sed -E 's/version:[[:space:]]*"?([^"]+)"?/\1/')
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/ha-app-influxdb-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          echo "Building InfluxDB app version: ${version} (${{ matrix.arch }})"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v6
        with:
          context: ./influxdb
          file: ./influxdb/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha,scope=influxdb-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=influxdb-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
