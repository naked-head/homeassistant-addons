name: BamBuddy App — Bug Report
description: Problem installing, updating, or configuring the BamBuddy App for Home Assistant.
labels: ["bug", "app:bambuddy"]
body:
  - type: markdown
    attributes:
      value: |
        ## Before you continue

        This repository only packages BamBuddy to run as a Home Assistant **App**
        (formerly called "Add-on") — it wires together Docker, `config.yaml`, and the
        HA Supervisor integration. **It is not BamBuddy itself.**

        If your problem is about how BamBuddy *behaves* — print queue logic, plate
        detection, printer connection, slicing results, notifications, UI bugs, etc. —
        please report it upstream instead, where the actual maintainer can act on it:

        👉 https://github.com/maziggy/bambuddy/issues/new/choose

        Issues about application behavior opened here will be redirected and closed,
        which just delays getting help. Rule of thumb: if reinstalling the App or
        changing one of its options wouldn't affect the problem, it's an upstream issue.

  - type: checkboxes
    id: confirm-scope
    attributes:
      label: Confirm this issue belongs here
      options:
        - label: >-
            This is about installing, updating, or configuring the BamBuddy App itself
            (not about BamBuddy's behavior once it's running).
          required: true

  - type: input
    id: app-version
    attributes:
      label: BamBuddy App version
      description: Settings → Apps → BamBuddy → top of page.
      placeholder: e.g. 1.0.10
    validations:
      required: true

  - type: dropdown
    id: ha-install
    attributes:
      label: Home Assistant installation type
      options:
        - Home Assistant OS
        - Home Assistant Supervised
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: App configuration (YAML)
      description: >-
        Settings → Apps → BamBuddy → Configuration tab → switch to YAML mode
        and paste it here. Remove/redact tokens, passwords, and external URLs first.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: App logs
      description: Settings → Apps → BamBuddy → Log tab. Please redact anything sensitive.
      render: shell