name: Builder

on:
  push:
    branches:
      - main
    paths:
      - "bambu-studio-api/**"
      - ".github/workflows/builder.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Override add-on version (defaults to config.yaml)"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version from config.yaml
        id: meta
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "${version}" ]; then
            version=$(grep -E '^version:' bambu-studio-api/config.yaml | sed -E 's/version:[[:space:]]*"?([^"]+)"?/\1/')
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/ha-app-bambu-studio-api-amd64" >> "$GITHUB_OUTPUT"
          echo "Building Bambu Studio API add-on version: ${version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: ./bambu-studio-api
          file: ./bambu-studio-api/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
